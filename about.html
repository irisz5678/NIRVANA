<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>关于我们 | NIRVANA</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "Segoe UI", Arial, sans-serif;
  background: #f5f5f5;
  color: #1a1a1a;
  line-height: 1.9;
}

/* ===== 顶部 Hero ===== */
.hero {
  position: relative;
  height: 70vh;
  overflow: hidden;
}
.hero img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.45);
}
.hero-text {
  position: relative;
  z-index: 2;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: #fff;
  padding: 0 24px;
}
.hero-text h1 {
  font-size: 48px;
  margin-bottom: 24px;
  letter-spacing: 2px;
}
.hero-text p {
  font-size: 18px;
  max-width: 600px;
}

/* ===== 内容区 ===== */
.section {
  background: #fff;
  padding: 120px 24px;
}
.container {
  max-width: 1100px;
  margin: 0 auto;
}

/* 左图右文 */
.split {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: center;
}
.split img {
  width: 100%;
  height: 360px;
  object-fit: cover;
}
.split h2 {
  font-size: 32px;
  margin-bottom: 24px;
}
.split p {
  font-size: 17px;
}

/* ===== 底部联系 ===== */
.contact {
  background: #111;
  color: #eaeaea;
  padding: 100px 24px;
  text-align: center;
}
.contact h2 {
  font-size: 28px;
  margin-bottom: 24px;
}
.contact p {
  font-size: 16px;
  opacity: 0.9;
}

/* ===== Footer ===== */
.footer {
  padding: 32px;
  text-align: center;
  font-size: 13px;
  color: #777;
}
</style>
</head>

<body>

<!-- Hero -->
<section class="hero">
  hero.jpg
  <div class="hero-text">
    <h1>礼赞生命，传承爱意</h1>
    <p>
      我们致力于为您提供超越期望的生命礼赞服务，
      让每一个瞬间都成为永恒的珍藏。
    </p>
  </div>
</section>

<!-- 内容 -->
